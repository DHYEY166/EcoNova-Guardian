# /etc/nginx/conf.d/econova.conf
# Replace YOUR_DOMAIN with your sslip.io address (e.g. 1-2-3-4.sslip.io)
# Certbot will auto-modify this file to add SSL.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Serve frontend static files
    root /home/ec2-user/app/frontend;
    index index.html;

    # All regular frontend requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy FastAPI backend endpoints
    location ~ ^/(classify|feedback|stats|health|visit) {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large body for image uploads (10 MB max)
        client_max_body_size 10m;

        # Reasonable timeout for Bedrock inference
        proxy_read_timeout 30s;
    }
}
